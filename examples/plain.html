<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HugoSplash Paywall — Plain HTML Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 1em; line-height: 1.6; }
    h1 { color: #f7931a; }
    .preview { color: #666; font-style: italic; margin-bottom: 2em; }
  </style>
</head>
<body>
  <h1>How I grew my newsletter to 10,000 subscribers</h1>

  <p class="preview">
    It took me 18 months of consistent writing, one viral post, and a pivot I didn't see coming.
    Here's the exact playbook that worked…
  </p>

  <!-- Content below this line is locked behind the paywall.
       Replace YOUR_PAYWALL_ID with the real ID from your HugoSplash dashboard. -->
  <div data-paywall-id="YOUR_PAYWALL_ID"></div>

  <script src="https://hugosplash.com/paywall.js" defer></script>
</body>
</html>
